<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>easy</title>
    <link rel="icon" href="../main/flag.png">
    <link rel="stylesheet" href="../easy/easy.css">
</head>
<body id="body">
    <header>
      <nav id="nav">
         <a href="../main/main.html"><img src="../quizztounsinobg.png" alt="logo" width="480" height="270" id="logo"></a>
      </nav>
   </header>

   <main>
        <div>
            <div id="starsdiv">
                <img src="../star.png" alt="star" id="star1" style="display: none;" class="stars">
                <img src="../star.png" alt="star" id="star2" style="display: none;" class="stars">
                <img src="../star.png" alt="star" id="star3" style="display: none;" class="stars">
                <img src="../nostar.png" alt="no star" id="no_star1" style="display: none;" class="stars">
                <img src="../nostar.png" alt="no star" id="no_star2" style="display: none;" class="stars">
                <img src="../nostar.png" alt="no star" id="no_star3" style="display: none;" class="stars">
            </div>
            <div id="quiz_container" style="display: none;">
                <h2 id="question"></h2>
                <div id="quiz_form">
                    <div id="options_container"></div>
                    <button id="submitbtn">Submit</button>
                    <h2 id="answer_result"></h2>
                    <h2 id="score_update"></h2>
                    <p id="comment"></p>
                    <p id="explainationParagraph"></p>
                    <button id="nextQuestionbtn" class="bigbtn">Next question</button>
                    <button id="finishbtn" style="display: none;" class="bigbtn">Finish quiz</button>
                </div>

            </div>
            <div id="startorrestart">
                <button id="startbtn" class="bigbtn wiggle">Start the quiz</button>
                <button id="restartbtn" style="display: none;" class="bigbtn">Restart the quiz</button>
            </div>
        </div>
   </main>
</body>
<script src="easy.js"></script>
</html>
